#textdomain wesnoth-For_Power

#define TRAIT_DIVINE
    [trait]
        id=divine
        male_name = _ "divine"
        female_name = _ "female^divine"
        description = _ "immune to drain, slow and poison"
        help_text=_"This unit is some kind of higher power. While they have a human like form, they are far more powerful than a human and do not suffer from a lot of torments common to mortals."
        [effect]
            apply_to=status
            add=unpoisonable
        [/effect]
        [effect]
            apply_to=status
            add=undrainable
        [/effect]
        [effect]
            apply_to=status
            add=unslowable
        [/effect]
    [/trait]
#enddef

#define TRAIT_DIVINE_MUSTHAVE
    {TRAIT_DIVINE}
    [+trait]
        availability="musthave"
    [/trait]
#enddef
